version: '3.8'

services:
  plant-disease-api:
    build: .
    container_name: plant-disease-api
    ports:
      - "8080:8080"
    environment:
      - MODEL_PATH=models/best_model.keras
    volumes:
      # Optional: Mount for development
      # - ./app:/app/app
      # - ./static:/app/static
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
